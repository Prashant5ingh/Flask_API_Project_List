name: CI/CD for Flask App to Render

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        working-directory: Flask_Project/saas-taskflow-api
        run: |
          docker build -t primedochub/saas-taskflow-app:latest .

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push primedochub/saas-taskflow-app:latest

      # Wait for Docker Hub propagation
      - name: Wait before deploy
        run: sleep 20

      # Trigger Render deploy
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}