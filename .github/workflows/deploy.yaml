name: CI/CD for Flask app to Railway

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image and push to Docker Hub
        working-directory: Flask_Project/saas-taskflow-api
        run: | 
          docker compose up -d --build   
          docker push primedochub/saas-taskflow-app:latest

      - name: Trigger Railway Redeploy
        run: |
          curl -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(id: \"'${{ secrets.RAILWAY_SERVICE_ID }}'\") }"
            }'