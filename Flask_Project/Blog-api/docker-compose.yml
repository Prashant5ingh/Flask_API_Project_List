version: "3.8"

services:

  web:
    build: .
    ports:
      - "5000:5500" # Map host port 5000 to container port 5500
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blogdb
      REDIS_URL: redis://redis:6379/0

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always # Ensure Redis restarts if it crashes