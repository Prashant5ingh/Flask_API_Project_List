version: '3.8'

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-auth-app
    ports:
      - "5900:5500"
    # environment:
    #   - FLASK_APP=run.py
    #   - FLASK_ENV=development
    #   - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-key}
    #   - JWT_ACCESS_TOKEN_EXPIRES=3600
    #   - SQLALCHEMY_DATABASE_URI=sqlite:////app/instance/users.db
    #   - SQLALCHEMY_TRACK_MODIFICATIONS=False
    volumes:
      - ./:/app                          # Code changes reflected immediately
      - flask_data:/app/instance         # Database persists across restarts
    command: python run.py
    restart: unless-stopped
    networks:
      - jwt-network

volumes:
  flask_data:
    driver: local

networks:
  jwt-network:
    driver: bridge




